<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 游戏中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f1a;
      --surface: #141627;
      --card-bg: #1a1d35;
      --card-hover: #22264a;
      --border: rgba(255,255,255,0.07);
      --accent1: #7c6ff7;
      --accent2: #f76fc1;
      --accent3: #6ff7c8;
      --text: #e8eaf6;
      --text-muted: #7a7f9a;
      --glow1: rgba(124,111,247,0.35);
      --glow2: rgba(247,111,193,0.25);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, var(--glow1), transparent),
        radial-gradient(ellipse 50% 40% at 80% 80%, var(--glow2), transparent);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 60px;
    }

    .logo {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 24px var(--accent1));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent1) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }

    .tagline {
      margin-top: 12px;
      font-size: 1rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 99px;
      margin: 20px auto 0;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    /* ── Game grid ── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    /* ── Game card ── */
    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 14px;
      cursor: pointer;
      transition:
        transform 0.25s cubic-bezier(.34,1.56,.64,1),
        background 0.2s,
        box-shadow 0.25s,
        border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .game-card:hover {
      transform: translateY(-8px) scale(1.02);
      background: var(--card-hover);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px var(--glow1);
      border-color: rgba(124,111,247,0.4);
    }

    .game-card:active {
      transform: translateY(-4px) scale(1.01);
    }

    .card-icon {
      font-size: 3rem;
      line-height: 1;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }

    .game-card:hover .card-icon {
      transform: scale(1.2) rotate(-5deg);
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
      width: fit-content;
      margin-top: auto;
    }

    .badge-new {
      background: rgba(124,111,247,0.2);
      color: var(--accent1);
      border: 1px solid rgba(124,111,247,0.4);
    }

    .badge-hot {
      background: rgba(247,111,193,0.2);
      color: var(--accent2);
      border: 1px solid rgba(247,111,193,0.4);
    }

    .badge-cool {
      background: rgba(111,247,200,0.15);
      color: var(--accent3);
      border: 1px solid rgba(111,247,200,0.35);
    }

    .play-hint {
      position: absolute;
      bottom: 18px;
      right: 20px;
      font-size: 1.1rem;
      opacity: 0;
      transform: translateX(6px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .game-card:hover .play-hint {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 70px;
      color: var(--text-muted);
      font-size: 0.82rem;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <header>
      <div class="logo">🎮</div>
      <h1>游戏中心</h1>
      <p class="tagline">选择一个游戏，开始玩耍！</p>
      <div class="divider"></div>
    </header>

    <p class="section-label">所有游戏</p>

    <div class="game-grid" id="game-grid">

      <!-- ── 小鸡下蛋 ── -->
      <a class="game-card" href="./小鸡下蛋/index.html" id="card-chick">
        <div class="card-icon">🐣</div>
        <div class="card-title">小鸡下蛋</div>
        <div class="card-desc">按住空格键让小鸡下蛋，挑战连击记录！</div>
        <span class="card-badge badge-hot">🔥 热门</span>
        <span class="play-hint">▶</span>
      </a>

      <!-- ── 占位：更多游戏即将到来 ── -->
      <!-- 复制上面的 <a class="game-card"> 块来添加新游戏 -->

    </div>

    <footer>
      🎲 更多游戏持续更新中&nbsp;&nbsp;·&nbsp;&nbsp;2026
    </footer>

  </div>
</body>
</html>
